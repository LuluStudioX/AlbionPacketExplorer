# Serves the Velopack feed at /apx/ (matches SimpleWebSource base URL .../apx).
server {
    listen 80;
    server_name _;

    # Health check for the tunnel / uptime monitors.
    location = /healthz {
        return 200 "ok\n";
        default_type text/plain;
    }

    location /apx/feed/ {
        alias /srv/feed/;
        autoindex off;
        default_type application/octet-stream;   # .nupkg and the RELEASES-* files
        types {
            application/json json;               # releases.<channel>.json / assets.<channel>.json
        }
        add_header Cache-Control "no-cache";     # always re-validate the small manifest
    }
}
