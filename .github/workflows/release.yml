          path: releases/osx-x64/*

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r osx-arm64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/osx-arm64

      - name: Compute pack version and release notes
        shell: bash
        run: |
          echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; } > notes.md
          echo "--- notes.md ---"; cat notes.md

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packTitle "Albion Packet Explorer"
          --packAuthors LuluStudioX
          --releaseNotes notes.md
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/osx-arm64
          --mainExe AlbionPacketExplorer
          --outputDir releases/osx-arm64
          --channel osx-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: osx-arm64
          path: releases/osx-arm64/*

  release:
    needs: [build-windows, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true

      # Nudge the update-feed hub to mirror this release immediately instead of waiting for its
      # poll. No-ops until HUB_DISPATCH_TOKEN (a PAT with access to the hub repo) is configured.
      - name: Notify update-feed hub
        env:
          HUB_DISPATCH_TOKEN: ${{ secrets.HUB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$HUB_DISPATCH_TOKEN" ]; then
            echo "HUB_DISPATCH_TOKEN not set; skipping (hub mirrors on its own schedule)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $HUB_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Lulu195/lulustudio-hub/dispatches \
            -d '{"event_type":"apx-release"}'
          echo "dispatched apx-release to the hub"
