name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/win-x64

      - name: Compute pack version
        shell: bash
        run: echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/win-x64
          --mainExe AlbionPacketExplorer.exe
          --outputDir releases/win-x64
          --icon src/AlbionPacketExplorer/Assets/app-icon.ico

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: releases/win-x64/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/linux-x64

      - name: Compute pack version
        shell: bash
        run: echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/linux-x64
          --mainExe AlbionPacketExplorer
          --outputDir releases/linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: releases/linux-x64/*

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r osx-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/osx-x64

      - name: Compute pack version
        shell: bash
        run: echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/osx-x64
          --mainExe AlbionPacketExplorer
          --outputDir releases/osx-x64

      - uses: actions/upload-artifact@v4
        with:
          name: osx-x64
          path: releases/osx-x64/*

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r osx-arm64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/osx-arm64

      - name: Compute pack version
        shell: bash
        run: echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/osx-arm64
          --mainExe AlbionPacketExplorer
          --outputDir releases/osx-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: osx-arm64
          path: releases/osx-arm64/*

  release:
    needs: [build-windows, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
