name: Release

on:
  push:
    tags:
      - 'v*'

# Build jobs upload their assets STRAIGHT to the GitHub release (created as a draft up front,
# published by the final job). No actions/upload-artifact anywhere: release assets do not count
# against the Actions artifact storage quota, which a transit-artifact design kept exhausting.
permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Body is set from the git-log changelog in the final 'release' job; create it empty here.
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft --notes "" --title "$GITHUB_REF_NAME"

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/win-x64

      - name: Compute pack version and release notes
        shell: bash
        run: |
          echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; } > notes.md
          echo "--- notes.md ---"; cat notes.md

      # Pull the live feed into the pack dir first so releases.<channel>.json accumulates every
      # version (with its notes) and a delta is built against the prior full package. Non-fatal:
      # if the feed is empty or unreachable, pack falls back to a fresh single-version feed.
      - name: Download existing feed for cumulative release
        shell: bash
        run: |
          vpk download http --url https://projects.lulustudio.dk/apx/feed \
            --channel win-x64 --outputDir releases/win-x64 \
            || echo "no existing feed yet (first cumulative release or feed unreachable); packing fresh"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packTitle "Albion Packet Explorer"
          --packAuthors LuluStudioX
          --releaseNotes notes.md
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/win-x64
          --mainExe AlbionPacketExplorer.exe
          --outputDir releases/win-x64
          --channel win-x64
          --icon src/AlbionPacketExplorer/Assets/app-icon.ico

      # Curated set: installer + portable (downloads) and the Velopack-1 feed
      # (releases.<rid>.json + *.nupkg). The legacy RELEASES-* index and the vpk-internal
      # assets.<rid>.json are intentionally excluded; no client or the feed needs them.
      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(releases/win-x64/*Setup.exe releases/win-x64/*Portable.zip \
                 releases/win-x64/*-full.nupkg releases/win-x64/*-delta.nupkg \
                 releases/win-x64/releases.*.json)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/linux-x64

      - name: Compute pack version and release notes
        shell: bash
        run: |
          echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; } > notes.md
          echo "--- notes.md ---"; cat notes.md

      - name: Download existing feed for cumulative release
        shell: bash
        run: |
          vpk download http --url https://projects.lulustudio.dk/apx/feed \
            --channel linux-x64 --outputDir releases/linux-x64 \
            || echo "no existing feed yet (first cumulative release or feed unreachable); packing fresh"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packTitle "Albion Packet Explorer"
          --packAuthors LuluStudioX
          --releaseNotes notes.md
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/linux-x64
          --mainExe AlbionPacketExplorer
          --outputDir releases/linux-x64
          --channel linux-x64
          --icon src/AlbionPacketExplorer/Assets/app-icon.png

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(releases/linux-x64/*.AppImage releases/linux-x64/*Portable.zip \
                 releases/linux-x64/*-full.nupkg releases/linux-x64/*-delta.nupkg \
                 releases/linux-x64/releases.*.json)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  build-macos-x64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r osx-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/osx-x64

      - name: Compute pack version and release notes
        shell: bash
        run: |
          echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; } > notes.md
          echo "--- notes.md ---"; cat notes.md

      - name: Download existing feed for cumulative release
        shell: bash
        run: |
          vpk download http --url https://projects.lulustudio.dk/apx/feed \
            --channel osx-x64 --outputDir releases/osx-x64 \
            || echo "no existing feed yet (first cumulative release or feed unreachable); packing fresh"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packTitle "Albion Packet Explorer"
          --packAuthors LuluStudioX
          --releaseNotes notes.md
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/osx-x64
          --mainExe AlbionPacketExplorer
          --outputDir releases/osx-x64
          --channel osx-x64

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(releases/osx-x64/*Setup.pkg releases/osx-x64/*Portable.zip \
                 releases/osx-x64/*-full.nupkg releases/osx-x64/*-delta.nupkg \
                 releases/osx-x64/releases.*.json)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  build-macos-arm64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish
        run: >
          dotnet publish src/AlbionPacketExplorer/AlbionPacketExplorer.csproj
          -c Release -r osx-arm64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:DebugSymbols=false
          -o publish/osx-arm64

      - name: Compute pack version and release notes
        shell: bash
        run: |
          echo "PACK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; } > notes.md
          echo "--- notes.md ---"; cat notes.md

      - name: Download existing feed for cumulative release
        shell: bash
        run: |
          vpk download http --url https://projects.lulustudio.dk/apx/feed \
            --channel osx-arm64 --outputDir releases/osx-arm64 \
            || echo "no existing feed yet (first cumulative release or feed unreachable); packing fresh"

      - name: Package with Velopack
        run: >
          vpk pack
          --packId AlbionPacketExplorer
          --packTitle "Albion Packet Explorer"
          --packAuthors LuluStudioX
          --releaseNotes notes.md
          --packVersion ${{ env.PACK_VERSION }}
          --packDir publish/osx-arm64
          --mainExe AlbionPacketExplorer
          --outputDir releases/osx-arm64
          --channel osx-arm64

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(releases/osx-arm64/*Setup.pkg releases/osx-arm64/*Portable.zip \
                 releases/osx-arm64/*-full.nupkg releases/osx-arm64/*-delta.nupkg \
                 releases/osx-arm64/releases.*.json)
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  release:
    needs: [build-windows, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The draft was created with --generate-notes, which on a direct-push repo (no PRs) yields only
      # a "Full Changelog" compare link. Replace the body with the same git-log changelog the Velopack
      # in-app release notes use, so the GitHub release page actually lists what changed.
      - name: Set release notes from git log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          RANGE=""; [ -n "$PREV" ] && RANGE="$PREV..${GITHUB_REF_NAME}"
          { echo "## ${GITHUB_REF_NAME}"; echo; git log --no-merges --pretty='- %s' $RANGE; echo; \
            [ -n "$PREV" ] && echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${GITHUB_REF_NAME}"; } > notes.md
          cat notes.md
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file notes.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false

      # Nudge the update-feed hub to mirror this release immediately instead of waiting for its
      # poll. No-ops until HUB_DISPATCH_TOKEN (a PAT with access to the hub repo) is configured.
      - name: Notify update-feed hub
        env:
          HUB_DISPATCH_TOKEN: ${{ secrets.HUB_DISPATCH_TOKEN }}
        run: |
          if [ -z "$HUB_DISPATCH_TOKEN" ]; then
            echo "HUB_DISPATCH_TOKEN not set; skipping (hub mirrors on its own schedule)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $HUB_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/LuluStudioX/lulustudio-hub/dispatches \
            -d '{"event_type":"apx-release"}'
          echo "dispatched apx-release to the hub"
