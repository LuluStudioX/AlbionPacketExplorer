# Machine-independent digest sync: fetches user-shared schema digests from the apx-digest
# Worker, archives new ones in the repo, folds them into the packet schema, and opens a PR.
# Runs without any local machine: the only secret is the Worker admin key.
# No artifacts are ever uploaded (repo policy).
name: digest-sync

on:
  schedule:
    # Every 2 hours during the beta (few dev users, low volume; a no-op run costs ~30s of
    # the 2000 free private-repo minutes/month). Relax to daily once volume grows.
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch digests from worker
        env:
          ADMIN_KEY: ${{ secrets.APX_DIGEST_ADMIN_KEY }}
        run: |
          curl -sf -H "Authorization: Bearer $ADMIN_KEY" \
            https://apx-digest.workpressfail2ban.workers.dev/v1/digests > /tmp/digests.json

      - name: Archive new digests
        id: archive
        run: |
          python3 - <<'EOF'
          import json, os, pathlib
          docs = json.load(open('/tmp/digests.json'))
          outdir = pathlib.Path('tools/digest-worker/digests')
          outdir.mkdir(parents=True, exist_ok=True)
          new = 0
          for d in docs:
              parts = d['key'].split(':')  # d:<schemaCommit>:<mode>:<sha256>
              if len(parts) != 4:
                  continue
              f = outdir / f"{parts[1]}-{parts[2]}-{parts[3][:12]}.json"
              if not f.exists():
                  f.write_text(json.dumps(d['body'], separators=(',', ':')) + '\n', encoding='utf-8')
                  new += 1
          print(f"stored {len(docs)} total, {new} new")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"new={new}\n")
          EOF

      # Storage hygiene: KV entries whose digest is already archived ON MAIN (i.e. a previous
      # run's PR was merged) are no longer needed - dedupe for them lives in the repo archive.
      # Deleting them keeps the namespace far from its storage/write ceilings. Entries from
      # THIS run are left alone until their PR merges; the 60-day TTL is the backstop.
      - name: Clear archived entries from KV
        env:
          ADMIN_KEY: ${{ secrets.APX_DIGEST_ADMIN_KEY }}
        run: |
          git ls-files tools/digest-worker/digests > /tmp/tracked.txt
          python3 - <<'EOF'
          import json, pathlib, subprocess
          docs = json.load(open('/tmp/digests.json'))
          tracked = set(pathlib.Path(p).name for p in open('/tmp/tracked.txt').read().split())
          doomed = []
          for d in docs:
              parts = d['key'].split(':')
              if len(parts) == 4 and f"{parts[1]}-{parts[2]}-{parts[3][:12]}.json" in tracked:
                  doomed.append(d['key'])
          pathlib.Path('/tmp/doomed.txt').write_text('\n'.join(doomed))
          print(f"clearing {len(doomed)} archived entr(ies) from KV")
          EOF
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            curl -sf -X DELETE -H "Authorization: Bearer $ADMIN_KEY" \
              "https://apx-digest.workpressfail2ban.workers.dev/v1/digest/$key" > /dev/null
          done < /tmp/doomed.txt

      - name: Rebuild digest overlay + schema
        if: steps.archive.outputs.new != '0'
        run: |
          python3 tools/build-inference-overlay.py --out tools/digest-overlay.json \
            tools/digest-worker/digests/*.json
          python3 tools/generate-schema.py

      - uses: actions/setup-dotnet@v4
        if: steps.archive.outputs.new != '0'
        with:
          dotnet-version: "10.0.x"

      - name: Build gate
        if: steps.archive.outputs.new != '0'
        run: dotnet build AlbionPacketExplorer.slnx -clp:ErrorsOnly

      - name: Open PR
        if: steps.archive.outputs.new != '0'
        env:
          # `gh pr create` needs a user PAT: the org forbids the default GITHUB_TOKEN (Actions)
          # from creating PRs. APX_PR_TOKEN is a fine-grained PAT with Pull requests: read/write
          # AND Contents: read (gh reads the repo default branch).
          # Falls back to the default token if the secret is unset - the PR step then fails as
          # before until APX_PR_TOKEN is added. See the digest-worker README for token setup.
          GH_TOKEN: ${{ secrets.APX_PR_TOKEN || github.token }}
          NEW: ${{ steps.archive.outputs.new }}
        run: |
          BRANCH="digest-sync/$(date -u +%Y%m%d-%H%M)"
          git config user.name "apx-digest-sync"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tools/digest-worker/digests tools/digest-overlay.json \
                  src/AlbionPacketExplorer/Assets/packet-schema.base.json
          if git diff --staged --quiet; then
            echo "Nothing changed after fold; skipping PR."
            exit 0
          fi
          git commit -m "packet(app): fold $NEW shared digest(s) into schema"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "packet(app): fold $NEW shared digest(s) into schema" \
            --body "Automated digest sync from the apx-digest worker. Review the schema diff, then merge. Digest archive: tools/digest-worker/digests/."
