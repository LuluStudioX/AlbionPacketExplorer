version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      community-toolkit:
        patterns:
          - "CommunityToolkit*"
